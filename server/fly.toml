# Fly.io config for the eGeez analytics + share-landing server.
#   fly launch --no-deploy      (creates the app; edit the name below)
#   fly secrets set OWNER_TOKEN=... APP_URL=https://your-app OG_IMAGE=https://your-app/icon-512.png
#   fly deploy
# The app is stateless and in-memory; a single small machine is plenty.
app = "fidel-quest-server"
primary_region = "jnb"          # pick one near your users (jnb = Johannesburg)

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0      # scale to zero when idle - analytics tolerate a cold start

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
