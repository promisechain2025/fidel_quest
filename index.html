<!doctype html>
<html lang="am">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f59e0b" />
    <!-- Bundle the Ethiopic (Ge'ez) font so glyphs render correctly on every
         device, not only ones that already ship one. The service worker caches
         it after first load, so the PWA still works offline. -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@400;500;700;900&display=swap"
      rel="stylesheet"
    />
    <meta
      name="description"
      content="Fidel Quest: an Amharic alphabet learning game for kids."
    />
    <!-- Share preview (WhatsApp / social). __APP_URL__ is replaced at build
         time; set it so shared links show a rich card instead of a bare URL. -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Fidel Quest — Learn the Amharic alphabet" />
    <meta property="og:description" content="A free, offline game that teaches kids the Amharic alphabet with Anbessa the lion cub." />
    <meta property="og:image" content="__APP_URL__/icon-512.png" />
    <meta property="og:url" content="__APP_URL__" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Fidel Quest — Learn the Amharic alphabet" />
    <meta name="twitter:description" content="A free, offline game that teaches kids the Amharic alphabet with Anbessa the lion cub." />
    <meta name="twitter:image" content="__APP_URL__/icon-512.png" />
    <title>Fidel Quest</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
